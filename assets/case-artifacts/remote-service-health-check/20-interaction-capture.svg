<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">14 远程服务健康检查与修复建议 - 交互截图</title>
  <desc id="desc">Screenshot-style task interaction capture with handoff, process report, correction report, and human confirmation.</desc>
  <rect width="920" height="640" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="572" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="54" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="85" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="85" r="6" fill="#f5c542"/>
  <circle cx="128" cy="85" r="6" fill="#66d17a"/>
  <text x="160" y="90" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">remote-service-health-check/interaction</text>

  <text x="58" y="146" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">INTERACTION CAPTURE</text>
  <text x="58" y="180" fill="#e0e0e0" font-family="Arial" font-size="27" font-weight="900">14 远程服务健康检查与修复建议</text>
  <rect x="702" y="130" width="160" height="58" rx="9" fill="#242424" stroke="#ff922c"/>
  <text x="724" y="153" fill="#888" font-family="Arial" font-size="12" font-weight="900">REVIEWABLE</text>
  <text x="724" y="178" fill="#ff922c" font-family="Arial" font-size="23" font-weight="900">TASK RUN</text>


    <g>
      <rect x="66" y="150" width="534" height="80" rx="12" fill="#202020" stroke="#ff922c"/>
      <text x="88" y="176" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">USER / 任务交代</text>
      <text x="88" y="200" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">异常窗口：10:12-10:19</text>
      <text x="88" y="222" fill="#888" font-family="Arial" font-size="12">脱敏 healthz 响应、错误窗口、部署版本、只读命令输出</text>
    </g>
    <g>
      <rect x="214" y="252" width="640" height="80" rx="12" fill="#202020" stroke="#66d17a"/>
      <text x="236" y="278" fill="#66d17a" font-family="Arial" font-size="12" font-weight="900">CODEX / 过程回报</text>
      <text x="236" y="302" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">先看 curl -i --max-time 10 http://127.0.0.1:8080/healthz；第一信号：10:12 到 10:19 错误率…</text>
      <text x="236" y="324" fill="#888" font-family="Arial" font-size="12">证据：evidence/healthz-window.txt</text>
    </g>
    <g>
      <rect x="214" y="354" width="640" height="80" rx="12" fill="#202020" stroke="#f1c86b"/>
      <text x="236" y="380" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">CODEX / 修正回报</text>
      <text x="236" y="404" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">修正：先用只读证据排序根因；复测：rg -n &quot;HTTP 503|db_pool_wait_ms|DB_POOL_SIZE&quot; evidence/ conf…</text>
      <text x="236" y="426" fill="#888" font-family="Arial" font-size="12">复测证据：evidence/config-delta.txt</text>
    </g>
    <g>
      <rect x="66" y="456" width="602" height="80" rx="12" fill="#202020" stroke="#b590ff"/>
      <text x="88" y="482" fill="#b590ff" font-family="Arial" font-size="12" font-weight="900">HUMAN / 人工确认</text>
      <text x="88" y="506" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">只读检查不能擅自重启、扩容或改配置。</text>
      <text x="88" y="528" fill="#888" font-family="Arial" font-size="12">health-report.md、repair-plan.md、rollback-note.md</text>
    </g>

  <rect x="66" y="576" width="788" height="28" rx="7" fill="#101010" stroke="#333"/>
  <text x="86" y="595" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">handoff -> report -> correction -> human confirmation</text>
</svg>
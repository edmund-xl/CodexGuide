<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">08 登录态网页只读检查 - 现场捕获</title>
  <desc id="desc">Screenshot-style proof capture built from the raw scene excerpt of a practical Codex task.</desc>
  <rect width="920" height="640" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="572" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="50" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="84" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="84" r="6" fill="#f5c542"/>
  <circle cx="128" cy="84" r="6" fill="#66d17a"/>
  <text x="160" y="89" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">authenticated-readonly-review/raw-scene</text>

  <text x="58" y="146" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">RUN PROOF CAPTURE</text>
  <text x="58" y="180" fill="#e0e0e0" font-family="Arial" font-size="26" font-weight="900">08 登录态网页只读检查</text>
  <text x="614" y="150" fill="#888" font-family="Arial" font-size="12" font-weight="900">RISK</text>
  <text x="614" y="176" fill="#ff922c" font-family="Arial" font-size="22" font-weight="900">中到高</text>

  <rect x="58" y="196" width="804" height="222" rx="9" fill="#11130f" stroke="#363020"/>

      <g>
        <text x="80" y="204" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">01</text>
        <circle cx="122" cy="200" r="4" fill="#888"/>
        <text x="142" y="204" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">signed-in-review.log</text>
      </g>
      <g>
        <text x="80" y="234" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">02</text>
        <circle cx="122" cy="230" r="4" fill="#888"/>
        <text x="142" y="234" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">mode=read_only</text>
      </g>
      <g>
        <text x="80" y="264" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">03</text>
        <circle cx="122" cy="260" r="4" fill="#888"/>
        <text x="142" y="264" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">allowed=截图、可见字段、链接状态</text>
      </g>
      <g>
        <text x="80" y="294" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">04</text>
        <circle cx="122" cy="290" r="4" fill="#888"/>
        <text x="142" y="294" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">blocked=点击保存、导出客户资料、修改账号设置</text>
      </g>
      <g>
        <text x="80" y="324" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">05</text>
        <circle cx="122" cy="320" r="4" fill="#888"/>
        <text x="142" y="324" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">finding=筛选器状态与表格数量不一致</text>
      </g>
      <g>
        <text x="80" y="354" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">06</text>
        <circle cx="122" cy="350" r="4" fill="#888"/>
        <text x="142" y="354" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">handoff=需要账号负责人确认</text>
      </g>

  <rect x="58" y="438" width="804" height="120" rx="9" fill="#1e1e1e" stroke="#333"/>
  <text x="80" y="430" fill="#888" font-family="Arial" font-size="12" font-weight="900">EVIDENCE CROSS-CHECK</text>

      <g>
        <rect x="60" y="438" width="800" height="32" rx="7" fill="#202020" stroke="#333"/>
        <text x="80" y="459" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">页面状态</text>
        <text x="240" y="459" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">账单概览加载成功，有一条付款提醒</text>
        <text x="680" y="459" fill="#888" font-family="Arial" font-size="12">readonly-review.md</text>
      </g>
      <g>
        <rect x="60" y="478" width="800" height="32" rx="7" fill="#242424" stroke="#333"/>
        <text x="80" y="499" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">禁点清单</text>
        <text x="240" y="499" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">更改计划、提交付款、删除成员均未点击</text>
        <text x="680" y="499" fill="#888" font-family="Arial" font-size="12">no-click-controls…</text>
      </g>
      <g>
        <rect x="60" y="518" width="800" height="32" rx="7" fill="#202020" stroke="#333"/>
        <text x="80" y="539" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">截图脱敏</text>
        <text x="240" y="539" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">邮箱和余额区域已遮挡</text>
        <text x="680" y="539" fill="#888" font-family="Arial" font-size="12">safe-screenshots/…</text>
      </g>

  <rect x="58" y="572" width="804" height="34" rx="8" fill="#101010" stroke="#333"/>
  <text x="76" y="594" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">$ 人工确认当前 URL 和页面标题是否符合检查目标。</text>
  <text x="500" y="594" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">$ 人工逐项核对 no-click-controls.md 中的按钮均未触发。</text>
</svg>
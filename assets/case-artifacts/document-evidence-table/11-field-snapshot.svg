<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">09 文档与 PDF 摘要到证据表 - 现场图</title>
  <desc id="desc">A terminal-style field snapshot for a practical Codex task.</desc>
  <rect width="920" height="520" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="452" rx="10" fill="#191919" stroke="#333"/>
  <text x="58" y="78" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">FIELD SNAPSHOT</text>
  <text x="58" y="115" fill="#e0e0e0" font-family="Arial" font-size="27" font-weight="900">09 文档与 PDF 摘要到证据表</text>
  <text x="58" y="146" fill="#888" font-family="Arial" font-size="15">多份文档摘要需要转成证据表，要求能追溯到页码和原句位置。</text>

  <rect x="58" y="172" width="484" height="250" rx="9" fill="#101510" stroke="#2b5d35"/>
  <circle cx="82" cy="191" r="5" fill="#ff6b6b"/>
  <circle cx="102" cy="191" r="5" fill="#f5c542"/>
  <circle cx="122" cy="191" r="5" fill="#66d17a"/>

      <g>
        <text x="72" y="204" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ 列出 docs/ 中可读文件</text>
        <text x="72" y="229" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">files=5, scanned_pdf=1 needs manual OCR</text>
      </g>
      <g>
        <text x="72" y="268" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ 生成 evidence-table.md</text>
        <text x="72" y="293" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">rows=18, missing_page=0</text>
      </g>
      <g>
        <text x="72" y="332" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ 把建议移入 summary-notes.md</text>
        <text x="72" y="357" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">fact_rows=18, inference_rows=5</text>
      </g>

  <rect x="572" y="172" width="292" height="250" rx="9" fill="#1e1e1e" stroke="#333"/>
  <text x="592" y="205" fill="#ff922c" font-family="Arial" font-size="13" font-weight="900">HANDOFF</text>

      <g>
        <rect x="592" y="222" width="252" height="42" rx="7" fill="#2c241d" stroke="#333"/>
        <text x="610" y="247" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">无法读取的扫描页不做事实结论。</text>
      </g>
      <g>
        <rect x="592" y="280" width="252" height="42" rx="7" fill="#202020" stroke="#333"/>
        <text x="610" y="305" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">表格结论必须能回到页码和摘录。</text>
      </g>
      <g>
        <rect x="592" y="338" width="252" height="42" rx="7" fill="#202020" stroke="#333"/>
        <text x="610" y="363" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">摘要可作为草稿，不能替代人工阅读原文。</text>
      </g>

  <rect x="58" y="438" width="806" height="28" rx="6" fill="#242424" stroke="#333"/>
  <text x="76" y="457" fill="#888" font-family="Arial" font-size="13">done: 每行证据都有页码、摘录、判断和人工复核状态。</text>
</svg>
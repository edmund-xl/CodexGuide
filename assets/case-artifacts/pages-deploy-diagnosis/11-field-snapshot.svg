<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">03 GitHub Pages 部署失败诊断 - 现场图</title>
  <desc id="desc">A terminal-style field snapshot for a practical Codex task.</desc>
  <rect width="920" height="520" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="452" rx="10" fill="#191919" stroke="#333"/>
  <text x="58" y="78" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">FIELD SNAPSHOT</text>
  <text x="58" y="115" fill="#e0e0e0" font-family="Arial" font-size="27" font-weight="900">03 GitHub Pages 部署失败诊断</text>
  <text x="58" y="146" fill="#888" font-family="Arial" font-size="15">收到部署失败通知，build 红色、deploy 跳过，需要判断是内容、workflow 还是发布配置问题。</text>

  <rect x="58" y="172" width="484" height="250" rx="9" fill="#101510" stroke="#2b5d35"/>
  <circle cx="82" cy="191" r="5" fill="#ff6b6b"/>
  <circle cx="102" cy="191" r="5" fill="#f5c542"/>
  <circle cx="122" cy="191" r="5" fill="#66d17a"/>

      <g>
        <text x="72" y="204" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ npm run build &amp;&amp; npm run check</text>
        <text x="72" y="229" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">Generated 44 bilingual pages; verify passed</text>
      </g>
      <g>
        <text x="72" y="268" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ 读取最新 Actions run 的 jobs</text>
        <text x="72" y="293" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">build=success, deploy=success</text>
      </g>
      <g>
        <text x="72" y="332" fill="#66d17a" font-family="Menlo, Consolas, monospace" font-size="15">$ curl -I -L --max-time 20 /recipes/index.html</text>
        <text x="72" y="357" fill="#b8b8b8" font-family="Menlo, Consolas, monospace" font-size="14">HTTP/2 200, content-type=text/html</text>
      </g>

  <rect x="572" y="172" width="292" height="250" rx="9" fill="#1e1e1e" stroke="#333"/>
  <text x="592" y="205" fill="#ff922c" font-family="Arial" font-size="13" font-weight="900">HANDOFF</text>

      <g>
        <rect x="592" y="222" width="252" height="42" rx="7" fill="#2c241d" stroke="#333"/>
        <text x="610" y="247" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">只把新 run 作为成功依据，不回头修改旧失败…</text>
      </g>
      <g>
        <rect x="592" y="280" width="252" height="42" rx="7" fill="#202020" stroke="#333"/>
        <text x="610" y="305" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">发布修复和内容改动尽量分开，便于回滚。</text>
      </g>
      <g>
        <rect x="592" y="338" width="252" height="42" rx="7" fill="#202020" stroke="#333"/>
        <text x="610" y="363" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">宣布完成前必须同时确认 Actions 与线上…</text>
      </g>

  <rect x="58" y="438" width="806" height="28" rx="6" fill="#242424" stroke="#333"/>
  <text x="76" y="457" fill="#888" font-family="Arial" font-size="13">done: 新提交触发的 build 与 deploy 均成功，线上案例总览返回 200。</text>
</svg>
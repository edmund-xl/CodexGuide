<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">10 API 变更影响分析 - 交付截图</title>
  <desc id="desc">A screenshot-style delivery capture for a practical Codex task.</desc>
  <rect width="920" height="560" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="492" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="54" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="85" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="85" r="6" fill="#f5c542"/>
  <circle cx="128" cy="85" r="6" fill="#66d17a"/>
  <text x="160" y="90" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">api-impact-analysis/delivery-review</text>

  <text x="58" y="150" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">DELIVERY CAPTURE</text>
  <text x="58" y="184" fill="#e0e0e0" font-family="Arial" font-size="27" font-weight="900">10 API 变更影响分析</text>
  <rect x="694" y="132" width="168" height="54" rx="8" fill="#242424" stroke="#ff922c"/>
  <text x="716" y="154" fill="#888" font-family="Arial" font-size="12" font-weight="900">MATURITY</text>
  <text x="716" y="178" fill="#ff922c" font-family="Arial" font-size="24" font-weight="900">93 / 100</text>

  <text x="74" y="218" fill="#888" font-family="Arial" font-size="12" font-weight="900">OUTPUT</text>
  <text x="592" y="218" fill="#888" font-family="Arial" font-size="12" font-weight="900">EVIDENCE STATUS</text>

      <g>
        <rect x="74" y="226" width="478" height="34" rx="7" fill="#202020" stroke="#333"/>
        <circle cx="96" cy="243" r="5" fill="#66d17a"/>
        <text x="116" y="248" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">test-matrix.md</text>
      </g>
      <g>
        <rect x="74" y="270" width="478" height="34" rx="7" fill="#242424" stroke="#333"/>
        <circle cx="96" cy="287" r="5" fill="#66d17a"/>
        <text x="116" y="292" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">| 场景 | 输入 | 预期 |</text>
      </g>
      <g>
        <rect x="74" y="314" width="478" height="34" rx="7" fill="#202020" stroke="#333"/>
        <circle cx="96" cy="331" r="5" fill="#66d17a"/>
        <text x="116" y="336" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">| archived 状态 | GET /v1/tasks?status=archived | 列表能展示…</text>
      </g>
      <g>
        <rect x="74" y="358" width="478" height="34" rx="7" fill="#242424" stroke="#333"/>
        <circle cx="96" cy="375" r="5" fill="#66d17a"/>
        <text x="116" y="380" fill="#e0e0e0" font-family="Arial" font-size="14" font-weight="700">| priority enum | priority=urgent | 校验通过或给出明确错误 |</text>
      </g>

      <g>
        <rect x="592" y="226" width="254" height="34" rx="7" fill="#1f1f1f" stroke="#333"/>
        <text x="610" y="248" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">端点变更</text>
        <circle cx="816" cy="242" r="6" fill="#66d17a"/>
      </g>
      <g>
        <rect x="592" y="270" width="254" height="34" rx="7" fill="#242424" stroke="#333"/>
        <text x="610" y="292" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">字段变更</text>
        <circle cx="816" cy="286" r="6" fill="#66d17a"/>
      </g>
      <g>
        <rect x="592" y="314" width="254" height="34" rx="7" fill="#1f1f1f" stroke="#333"/>
        <text x="610" y="336" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">错误码</text>
        <circle cx="816" cy="330" r="6" fill="#66d17a"/>
      </g>
      <g>
        <rect x="592" y="358" width="254" height="34" rx="7" fill="#242424" stroke="#333"/>
        <text x="610" y="380" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">调用点</text>
        <circle cx="816" cy="374" r="6" fill="#66d17a"/>
      </g>

  <rect x="74" y="402" width="356" height="70" rx="8" fill="#2c241d" stroke="#ff922c"/>
  <text x="96" y="430" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">FINAL REVIEW</text>
  <text x="96" y="456" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">影响表覆盖端点、字段、鉴权、限额和错误码。</text>

  <rect x="450" y="402" width="396" height="70" rx="8" fill="#202020" stroke="#333"/>
  <text x="472" y="430" fill="#888" font-family="Arial" font-size="12" font-weight="900">HANDOFF</text>
  <text x="472" y="456" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">没有 owner 的调用点不能直接关闭。</text>

  <text x="74" y="506" fill="#666" font-family="Arial" font-size="13">The delivery capture is a visual handoff: result, evidence status, final review, and owner action in one frame.</text>
</svg>
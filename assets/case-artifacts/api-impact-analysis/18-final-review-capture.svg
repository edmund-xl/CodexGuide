  <text x="58" y="184" fill="#e0e0e0" font-family="Arial" font-size="28" font-weight="900">10 API 变更影响分析</text>
  <rect x="732" y="132" width="130" height="58" rx="9" fill="#242424" stroke="#66d17a"/>

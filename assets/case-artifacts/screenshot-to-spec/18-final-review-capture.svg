<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">07 设计截图转实现规格 - 终审现场</title>
  <desc id="desc">A field-evidence capture from a practical Codex task sequence.</desc>
  <rect width="920" height="520" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="452" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="54" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="85" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="85" r="6" fill="#f5c542"/>
  <circle cx="128" cy="85" r="6" fill="#66d17a"/>
  <text x="160" y="90" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">screenshot-to-spec/finalReview</text>

  <text x="58" y="150" fill="#66d17a" font-family="Arial" font-size="15" font-weight="900">FINAL REVIEW</text>
  <text x="58" y="184" fill="#e0e0e0" font-family="Arial" font-size="28" font-weight="900">07 设计截图转实现规格</text>
  <rect x="732" y="132" width="130" height="58" rx="9" fill="#242424" stroke="#66d17a"/>
  <text x="754" y="154" fill="#888" font-family="Arial" font-size="12" font-weight="900">STEP</text>
  <text x="754" y="180" fill="#66d17a" font-family="Arial" font-size="27" font-weight="900">03</text>

  <rect x="58" y="206" width="804" height="0" fill="none"/>
  <text x="58" y="214" fill="#888" font-family="Arial" font-size="15">输出 8 个组件、5 个状态、3 个断点的实现清单。</text>

      <g>
        <rect x="58" y="228" width="804" height="42" rx="8" fill="#202020" stroke="#333"/>
        <text x="82" y="253" fill="#66d17a" font-family="Arial" font-size="12" font-weight="900">材料</text>
        <text x="170" y="253" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">目标截图、当前截图、可复用限制、视口清单</text>
      </g>
      <g>
        <rect x="58" y="280" width="804" height="42" rx="8" fill="#242424" stroke="#333"/>
        <text x="82" y="305" fill="#66d17a" font-family="Arial" font-size="12" font-weight="900">动作</text>
        <text x="170" y="305" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">规格包含 token、组件、状态、响应式规则和验收项。</text>
      </g>
      <g>
        <rect x="58" y="332" width="804" height="42" rx="8" fill="#202020" stroke="#333"/>
        <text x="82" y="357" fill="#66d17a" font-family="Arial" font-size="12" font-weight="900">信号</text>
        <text x="170" y="357" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">截图不能证明交互状态，缺失状态必须标为待确认。</text>
      </g>
      <g>
        <rect x="58" y="384" width="804" height="42" rx="8" fill="#242424" stroke="#333"/>
        <text x="82" y="409" fill="#66d17a" font-family="Arial" font-size="12" font-weight="900">证据</text>
        <text x="170" y="409" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">implementation-spec.md、component-checklist.md、acceptance-shots/</text>
      </g>

  <rect x="58" y="444" width="804" height="34" rx="8" fill="#101010" stroke="#333"/>
  <text x="80" y="466" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">HANDOFF: 中</text>

      <text x="236" y="302" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">先看 curl -I -L --max-time 20 https://edmund-xl.github.io/CodexGuide/；第一信号：原始需求…</text>
      <text x="236" y="324" fill="#888" font-family="Arial" font-size="12">证据：automation-brief.md</text>
    </g>
    <g>
      <rect x="214" y="354" width="640" height="80" rx="12" fill="#202020" stroke="#f1c86b"/>
      <text x="236" y="380" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">CODEX / 修正回报</text>
      <text x="236" y="404" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">修正：改为 URL、状态码和页面标记；复测：curl -I -L --max-time 20 https://edmund-xl.github.io/Co…</text>
      <text x="236" y="426" fill="#888" font-family="Arial" font-size="12">复测证据：mock-result.md</text>
    </g>
    <g>
      <rect x="66" y="456" width="602" height="80" rx="12" fill="#202020" stroke="#b590ff"/>
      <text x="88" y="482" fill="#b590ff" font-family="Arial" font-size="12" font-weight="900">HUMAN / 人工确认</text>
      <text x="88" y="506" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">自动化不能替代需要人工判断的动作。</text>
      <text x="88" y="528" fill="#888" font-family="Arial" font-size="12">automation-brief.md、mock-result.md、pause-rules.md</text>
    </g>

  <rect x="66" y="576" width="788" height="28" rx="7" fill="#101010" stroke="#333"/>
  <text x="86" y="595" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">handoff -> report -> correction -> human confirmation</text>

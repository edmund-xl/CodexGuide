  <text x="58" y="180" fill="#e0e0e0" font-family="Arial" font-size="26" font-weight="900">12 自动化提醒与定期检查</text>
  <text x="614" y="150" fill="#888" font-family="Arial" font-size="12" font-weight="900">RISK</text>
  <text x="614" y="176" fill="#ff922c" font-family="Arial" font-size="22" font-weight="900">中</text>

  <rect x="58" y="196" width="804" height="222" rx="9" fill="#11130f" stroke="#363020"/>

      <g>
        <text x="80" y="204" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">01</text>
        <circle cx="122" cy="200" r="4" fill="#888"/>
        <text x="142" y="204" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">scheduled-check-run.txt</text>
      </g>
      <g>
        <text x="80" y="234" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">02</text>
        <circle cx="122" cy="230" r="4" fill="#888"/>
        <text x="142" y="234" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">schedule=weekday 09:00</text>
      </g>
      <g>
        <text x="80" y="264" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">03</text>
        <circle cx="122" cy="260" r="4" fill="#ff6b6b"/>
        <text x="142" y="264" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">exit_condition=no new failures and no stale issue over 3 days</text>
      </g>
      <g>
        <text x="80" y="294" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">04</text>
        <circle cx="122" cy="290" r="4" fill="#ff6b6b"/>
        <text x="142" y="294" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">first_run=missing failure notification channel</text>
      </g>
      <g>
        <text x="80" y="324" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">05</text>
        <circle cx="122" cy="320" r="4" fill="#ff6b6b"/>
        <text x="142" y="324" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">fix=补失败提醒、停止条件和人工接手人</text>
      </g>

  <rect x="58" y="438" width="804" height="120" rx="9" fill="#1e1e1e" stroke="#333"/>
  <text x="80" y="430" fill="#888" font-family="Arial" font-size="12" font-weight="900">EVIDENCE CROSS-CHECK</text>

      <g>
        <rect x="60" y="438" width="800" height="32" rx="7" fill="#202020" stroke="#333"/>

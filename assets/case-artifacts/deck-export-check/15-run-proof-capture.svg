<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">01 演示稿生成与导出核查 - 现场捕获</title>
  <desc id="desc">Screenshot-style proof capture built from the raw scene excerpt of a practical Codex task.</desc>
  <rect width="920" height="640" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="572" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="50" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="84" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="84" r="6" fill="#f5c542"/>
  <circle cx="128" cy="84" r="6" fill="#66d17a"/>
  <text x="160" y="89" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">deck-export-check/raw-scene</text>

  <text x="58" y="146" fill="#ff922c" font-family="Arial" font-size="15" font-weight="900">RUN PROOF CAPTURE</text>
  <text x="58" y="180" fill="#e0e0e0" font-family="Arial" font-size="26" font-weight="900">01 演示稿生成与导出核查</text>
  <text x="614" y="150" fill="#888" font-family="Arial" font-size="12" font-weight="900">RISK</text>
  <text x="614" y="176" fill="#ff922c" font-family="Arial" font-size="22" font-weight="900">低到中</text>

  <rect x="58" y="196" width="804" height="222" rx="9" fill="#11130f" stroke="#363020"/>

      <g>
        <text x="80" y="204" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">01</text>
        <circle cx="122" cy="200" r="4" fill="#888"/>
        <text x="142" y="204" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">deck-export.log</text>
      </g>
      <g>
        <text x="80" y="234" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">02</text>
        <circle cx="122" cy="230" r="4" fill="#ff6b6b"/>
        <text x="142" y="234" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">slide_count=10 expected=7 status=fail</text>
      </g>
      <g>
        <text x="80" y="264" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">03</text>
        <circle cx="122" cy="260" r="4" fill="#ff6b6b"/>
        <text x="142" y="264" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">overflow=data-slide body_height=118 card_height=92</text>
      </g>
      <g>
        <text x="80" y="294" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">04</text>
        <circle cx="122" cy="290" r="4" fill="#888"/>
        <text x="142" y="294" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">human_review=试用期、隐私表述、版权素材</text>
      </g>
      <g>
        <text x="80" y="324" fill="#666" font-family="Menlo, Consolas, monospace" font-size="13">05</text>
        <circle cx="122" cy="320" r="4" fill="#888"/>
        <text x="142" y="324" fill="#e0e0e0" font-family="Menlo, Consolas, monospace" font-size="15">fix=锁定 7 页结构，缩短数据页正文，重新导出截图</text>
      </g>

  <rect x="58" y="438" width="804" height="120" rx="9" fill="#1e1e1e" stroke="#333"/>
  <text x="80" y="430" fill="#888" font-family="Arial" font-size="12" font-weight="900">EVIDENCE CROSS-CHECK</text>

      <g>
        <rect x="60" y="438" width="800" height="32" rx="7" fill="#202020" stroke="#333"/>
        <text x="80" y="459" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">大纲锁定</text>
        <text x="240" y="459" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">7 页结构，无价格、无客户名</text>
        <text x="680" y="459" fill="#888" font-family="Arial" font-size="12">slide-outline.md</text>
      </g>
      <g>
        <rect x="60" y="478" width="800" height="32" rx="7" fill="#242424" stroke="#333"/>

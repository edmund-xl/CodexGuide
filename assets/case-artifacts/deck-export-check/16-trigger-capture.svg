<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">01 演示稿生成与导出核查 - 触发现场</title>
  <desc id="desc">A field-evidence capture from a practical Codex task sequence.</desc>
  <rect width="920" height="520" rx="8" fill="#141414"/>
  <rect x="34" y="34" width="852" height="452" rx="10" fill="#191919" stroke="#333"/>
  <rect x="58" y="58" width="804" height="54" rx="8" fill="#101010" stroke="#333"/>
  <circle cx="84" cy="85" r="6" fill="#ff6b6b"/>
  <circle cx="106" cy="85" r="6" fill="#f5c542"/>
  <circle cx="128" cy="85" r="6" fill="#66d17a"/>
  <text x="160" y="90" fill="#888" font-family="Menlo, Consolas, monospace" font-size="13">deck-export-check/trigger</text>

  <text x="58" y="150" fill="#f1c86b" font-family="Arial" font-size="15" font-weight="900">TRIGGER CAPTURE</text>
  <text x="58" y="184" fill="#e0e0e0" font-family="Arial" font-size="28" font-weight="900">01 演示稿生成与导出核查</text>
  <rect x="732" y="132" width="130" height="58" rx="9" fill="#242424" stroke="#f1c86b"/>
  <text x="754" y="154" fill="#888" font-family="Arial" font-size="12" font-weight="900">STEP</text>
  <text x="754" y="180" fill="#f1c86b" font-family="Arial" font-size="27" font-weight="900">01</text>

  <rect x="58" y="206" width="804" height="0" fill="none"/>
  <text x="58" y="214" fill="#888" font-family="Arial" font-size="15">一份 800 字产品说明需要在当天交给团队做内部评审，要求 7 页以内且能导出。</text>

      <g>
        <rect x="58" y="228" width="804" height="42" rx="8" fill="#202020" stroke="#333"/>
        <text x="82" y="253" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">材料</text>
        <text x="170" y="253" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">脱敏产品说明、品牌色、页数限制、必须出现的三条信息</text>
      </g>
      <g>
        <rect x="58" y="280" width="804" height="42" rx="8" fill="#242424" stroke="#333"/>
        <text x="82" y="305" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">动作</text>
        <text x="170" y="305" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">人工确认 7 页大纲后再生成文件</text>
      </g>
      <g>
        <rect x="58" y="332" width="804" height="42" rx="8" fill="#202020" stroke="#333"/>
        <text x="82" y="357" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">信号</text>
        <text x="170" y="357" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">第一轮生成 10 页，数据页正文在 1440px 预览里溢出。</text>
      </g>
      <g>
        <rect x="58" y="384" width="804" height="42" rx="8" fill="#242424" stroke="#333"/>
        <text x="82" y="409" fill="#f1c86b" font-family="Arial" font-size="12" font-weight="900">证据</text>
        <text x="170" y="409" fill="#e0e0e0" font-family="Arial" font-size="15" font-weight="800">slide-outline.md</text>
      </g>

  <rect x="58" y="444" width="804" height="34" rx="8" fill="#101010" stroke="#333"/>
  <text x="80" y="466" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">FIRST SIGNAL: 脱敏产品说明、品牌色、页数限制、必须出现的三条信息</text>

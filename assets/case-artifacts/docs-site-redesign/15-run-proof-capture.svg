        <text x="680" y="499" fill="#888" font-family="Arial" font-size="12">verify-site.mjs</text>
      </g>
      <g>
        <rect x="60" y="518" width="800" height="32" rx="7" fill="#202020" stroke="#333"/>
        <text x="80" y="539" fill="#ff922c" font-family="Arial" font-size="12" font-weight="900">移动端</text>
        <text x="240" y="539" fill="#e0e0e0" font-family="Arial" font-size="13" font-weight="800">390px 下无页面横向溢出</text>
        <text x="680" y="539" fill="#888" font-family="Arial" font-size="12">mobile screenshots</text>
      </g>

  <rect x="58" y="572" width="804" height="34" rx="8" fill="#101010" stroke="#333"/>
  <text x="76" y="594" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">$ npm run build</text>
  <text x="500" y="594" fill="#666" font-family="Menlo, Consolas, monospace" font-size="12">$ npm run check</text>
</svg>